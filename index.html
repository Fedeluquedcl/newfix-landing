  <style>
  [data-animate] {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
  }
  [data-animate="left"]  { transform: translateX(-28px); }
  [data-animate="right"] { transform: translateX(28px); }
  [data-animate="scale"] { transform: scale(0.93); opacity: 0; }
  [data-animate].animate-in {
    opacity: 1 !important;
    transform: none !important;
  }
  [data-animate-delay="1"] { transition-delay: 0.08s; }
  [data-animate-delay="2"] { transition-delay: 0.16s; }
  [data-animate-delay="3"] { transition-delay: 0.24s; }
  [data-animate-delay="4"] { transition-delay: 0.32s; }
  [data-animate-delay="5"] { transition-delay: 0.40s; }
  [data-animate-delay="6"] { transition-delay: 0.48s; }

  .btn-shine {
    position: relative;
    overflow: hidden;
  }
  .btn-shine::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }
  .btn-shine:hover::after {
    left: 150%;
  }
  </style>
